name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    # Tag-triggered 3-OS build + publish. Each runner builds for its host OS (native modules
    # rebuild natively — no cross-compilation) and uploads its artifacts to the same GitHub
    # release. electron-builder dedupes by tag; the app-builder-lib publisher-cache patch
    # (patches/app-builder-lib+26.15.3.patch) prevents concurrent NSIS callbacks from
    # creating duplicate releases. CI publishes with the auto GITHUB_TOKEN.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    permissions:
      # The auto GITHUB_TOKEN needs contents:write to create releases and upload
      # assets. Without this, repos defaulting to read-only token perms fail with
      # 403 "Resource not accessible by integration" on the release publish step.
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/electron
            ~/Library/Caches/electron
            ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}

      - name: Install Linux build deps (node-pty native build)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon (iconutil from build/icon.png)
        if: runner.os == 'macOS'
        run: npm run build:icon

      - name: Build + publish
        env:
          # The auto CI token can create releases + upload assets on this repo.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release