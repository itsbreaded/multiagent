name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    # Cross-platform test matrix: typecheck + unit tests run on all three OSes so a
    # platform-specific regression (process snapshot, shell integration, native ABI) is
    # caught before merge. Native modules (better-sqlite3, node-pty) rebuild natively on
    # each runner via postinstall — no cross-compilation.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/electron
            ~/Library/Caches/electron
            ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}

      - name: Install Linux build/runtime deps (node-pty native build + Electron runtime)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libgtk-3-0 libnss3 libasound2t64 libgbm1 libxss1

      - name: Install dependencies
        # postinstall downloads Electron + rebuilds better-sqlite3 (and node-pty on mac/linux)
        # for the host ABI. Do NOT add --ignore-scripts.
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Electron E2E (xvfb on Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e

      - name: Electron E2E
        if: runner.os != 'Linux'
        run: npm run test:e2e

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          # npm test runs vitest without coverage, so coverage/ usually doesn't exist.
          # Ignore rather than warn; switch the Test step to `npm run test:coverage`
          # to actually collect per-OS coverage artifacts.
          if-no-files-found: ignore
          name: coverage-${{ runner.os }}
          path: coverage/